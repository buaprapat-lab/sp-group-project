<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERIOUS PUNCH: CASHIER MODE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans+Thai:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-color: #eeeeee;
        --accent-red: #e4002b;
        --card-black: #242424;
        --text-white: #ffffff;
        --gray-sub: #888888;
        --success-green: #28a745;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        font-family: "IBM Plex Sans Thai", sans-serif;
        color: var(--card-black);
        height: 100vh;
        display: flex;
        overflow: hidden;
      }

      /* ─── Sidebar (Desktop) ─── */
      aside {
        width: 90px;
        background: var(--card-black);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 0;
        gap: 35px;
        border-right: 2px solid #333;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 100;
      }

      .nav-icon {
        color: #ffffff;
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font-size: 0.6rem;
        font-family: "IBM Plex Sans Thai", sans-serif;
        font-weight: 500;
      }
      .nav-icon span {
        color: #ffffff;
      }
      .nav-icon:hover {
        color: #ffffff;
        opacity: 0.7;
        transform: scale(1.1);
      }
      .nav-icon.active {
        color: var(--accent-red) !important;
      }
      .nav-icon.active span {
        color: var(--accent-red) !important;
      }

      /* ─── Main Content ─── */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 25px;
        gap: 20px;
        margin-left: 90px; /* เผื่อพื้นที่ให้ Desktop Sidebar */
        height: 100vh;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .order-info-card {
        background: var(--card-black);
        color: white;
        padding: 15px 30px;
        border-radius: 4px;
        display: flex;
        gap: 40px;
        border-left: 6px solid var(--accent-red);
      }

      .order-info-card h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
      }
      .order-info-card span {
        color: var(--gray-sub);
        font-size: 0.9rem;
        text-transform: uppercase;
      }

      /* --- Billing Section --- */
      .billing-container {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 20px;
        flex: 1;
        overflow: hidden;
      }

      /* Left: List Menu */
      .bill-list-card {
        background: white;
        border: 3px solid var(--card-black);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .list-header {
        background: var(--card-black);
        color: white;
        padding: 15px;
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 40px;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.85rem;
      }

      .item-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
      }

      .bill-item {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 40px;
        padding: 15px 5px;
        border-bottom: 1px solid #ddd;
        align-items: center;
        font-weight: 500;
      }

      .btn-void {
        color: #ccc;
        cursor: pointer;
        border: none;
        background: none;
      }
      .btn-void:hover {
        color: var(--accent-red);
      }

      /* Right: Payment Area */
      .payment-card {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .summary-box {
        background: white;
        border: 3px solid var(--card-black);
        padding: 20px;
        border-radius: 8px;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 1.2rem;
      }

      .total-row {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 2px dashed #ccc;
        font-size: 2.5rem;
        font-family: "Bebas Neue", sans-serif;
        color: var(--accent-red);
      }

      .payment-methods {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .method-btn {
        background: white;
        border: 2px solid var(--card-black);
        padding: 15px;
        cursor: pointer;
        font-weight: bold;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
      }

      .method-btn.active {
        background: var(--card-black);
        color: white;
      }

      .input-display {
        background: var(--card-black);
        color: white;
        padding: 20px;
        border-radius: 8px;
        text-align: right;
        font-size: 2rem;
        font-family: monospace;
      }

      .change-box {
        background: #d4edda;
        border: 2px solid var(--success-green);
        padding: 15px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--success-green);
        font-weight: bold;
      }

      .btn-checkout {
        background: var(--accent-red);
        color: white;
        border: none;
        padding: 20px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        cursor: pointer;
        border-radius: 8px;
        box-shadow: 0 6px 0 #800018;
        transition: 0.1s;
      }

      .btn-checkout:active {
        transform: translateY(4px);
        box-shadow: 0 2px 0 #800018;
      }

      /* ─── Bottom Nav (Mobile) ─── */
      .bottom-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card-black);
        border-top: 2px solid #333;
        z-index: 100;
        padding: 8px 0;
        justify-content: space-around;
      }
      .bottom-nav .nav-icon {
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font-size: 0.6rem;
      }
      .bottom-nav .nav-icon.active {
        color: var(--accent-red);
      }
      .bottom-nav .nav-icon.active span {
        color: var(--accent-red);
      }
      .bottom-nav .nav-icon svg {
        width: 22px;
        height: 22px;
      }

      /* =========================================
         Responsive (หน้าจอแคบ) 
         ========================================= */
      @media (max-width: 900px) {
        body {
          flex-direction: column;
          overflow-y: auto; /* ปล่อยให้บอดี้ scroll ได้เมื่อจอเล็ก */
        }

        aside {
          display: none; /* ซ่อน Desktop Sidebar */
        }

        .bottom-nav {
          display: flex; /* แสดง Mobile Nav */
        }

        main {
          margin-left: 0;
          height: auto;
          padding: 15px;
          padding-bottom: 80px; /* เผื่อพื้นที่ให้ Bottom Nav ไม่บังเนื้อหา */
        }

        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 15px;
        }

        .order-info-card {
          width: 100%;
          justify-content: space-between;
          gap: 20px;
        }

        .billing-container {
          display: flex;
          flex-direction: column;
          overflow: visible;
        }

        .bill-list-card {
          height: 350px;
        }
      }

      @media (max-width: 480px) {
        .order-info-card {
          flex-direction: column;
          gap: 10px;
        }

        .list-header,
        .bill-item {
          grid-template-columns: 2fr 1fr 1fr 30px;
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <aside>
      <div class="nav-icon">
        <i data-lucide="layout-grid"></i><span>แผนผัง</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="clipboard-list"></i><span>ออเดอร์</span>
      </div>
      <div class="nav-icon active">
        <i data-lucide="banknote"></i><span>เก็บเงิน</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="history"></i><span>ประวัติ</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="settings"></i><span>ตั้งค่า</span>
      </div>
    </aside>

    <main>
      <header>
        <div class="order-info-card">
          <div>
            <span>Order No.</span>
            <h2>#SP-8829</h2>
          </div>
          <div>
            <span>Type / Table</span>
            <h2>DINE-IN: T-02</h2>
          </div>
        </div>
        <div style="font-family: &quot;Bebas Neue&quot;; font-size: 1.5rem">
          9 APR 2024 | 14:30
        </div>
      </header>

      <div class="billing-container">
        <div class="bill-list-card">
          <div class="list-header">
            <div>Item Menu</div>
            <div>Qty</div>
            <div>Price</div>
            <div></div>
          </div>
          <div class="item-scroll" id="bill-items"></div>
        </div>

        <div class="payment-card">
          <div class="summary-box">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal">฿0.00</span>
            </div>
            <div class="summary-row">
              <span>VAT (7%)</span>
              <span id="tax">฿0.00</span>
            </div>
            <div class="total-row">
              <span>Total Amount</span>
              <span id="total-price">฿0.00</span>
            </div>
          </div>

          <div class="payment-methods">
            <div class="method-btn active" onclick="setMethod('CASH')">
              <i data-lucide="coins"></i> CASH
            </div>
            <div class="method-btn" onclick="setMethod('QR')">
              <i data-lucide="qr-code"></i> QR PAY
            </div>
            <div class="method-btn" onclick="setMethod('CARD')">
              <i data-lucide="credit-card"></i> CARD
            </div>
          </div>

          <div class="input-display">
            <span style="font-size: 0.8rem; color: #666; display: block"
              >CUSTOMER PAY</span
            >
            ฿ <span id="display-pay">0</span>
          </div>

          <div class="change-box">
            <span>TOTAL RETURN</span>
            <span id="display-change" style="font-size: 1.5rem">฿0.00</span>
          </div>

          <button class="btn-checkout" onclick="confirmPayment()">
            CHECKOUT & PRINT RECEIPT
          </button>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="nav-icon">
        <i data-lucide="layout-grid"></i><span>แผนผัง</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="clipboard-list"></i><span>ออเดอร์</span>
      </div>
      <div class="nav-icon active">
        <i data-lucide="banknote"></i><span>เก็บเงิน</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="history"></i><span>ประวัติ</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="settings"></i><span>ตั้งค่า</span>
      </div>
    </nav>

    <script>
      let orderItems = [
        { name: "Serious Punch Burger", qty: 2, price: 240 },
        { name: "KFC Styled Fries (L)", qty: 1, price: 89 },
        { name: "Coca-Cola Refill", qty: 3, price: 135 },
        { name: "Spicy Wing (6pcs)", qty: 1, price: 159 },
        { name: "Onion Rings", qty: 1, price: 79 },
        { name: "Extra Cheese", qty: 2, price: 40 },
      ];

      let customerPay = 1000;

      function renderBill() {
        const listContainer = document.getElementById("bill-items");
        listContainer.innerHTML = "";
        let subtotal = 0;

        orderItems.forEach((item, index) => {
          const totalItemPrice = item.price;
          subtotal += totalItemPrice;

          const row = document.createElement("div");
          row.className = "bill-item";
          row.innerHTML = `
                    <div>${item.name}</div>
                    <div>x${item.qty}</div>
                    <div>฿${item.price.toLocaleString()}</div>
                    <button class="btn-void" onclick="removeItem(${index})"><i data-lucide="trash-2" style="width:18px"></i></button>
                `;
          listContainer.appendChild(row);
        });

        const tax = subtotal * 0.07;
        const total = subtotal + tax;

        document.getElementById("subtotal").innerText =
          `฿${subtotal.toLocaleString()}`;
        document.getElementById("tax").innerText =
          `฿${tax.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
        document.getElementById("total-price").innerText =
          `฿${total.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;

        updateChange(total);
        lucide.createIcons();
      }

      function updateChange(total) {
        const change = customerPay - total;
        document.getElementById("display-pay").innerText =
          customerPay.toLocaleString();
        document.getElementById("display-change").innerText =
          `฿${(change > 0 ? change : 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
      }

      function setMethod(method) {
        document
          .querySelectorAll(".method-btn")
          .forEach((btn) => btn.classList.remove("active"));
        event.currentTarget.classList.add("active");
      }

      function removeItem(index) {
        if (confirm("ต้องการยกเลิกรายการนี้ใช่หรือไม่?")) {
          orderItems.splice(index, 1);
          renderBill();
        }
      }

      function confirmPayment() {
        alert("Payment Confirmed! Printing Receipt...");
        window.location.reload();
      }

      renderBill();
      lucide.createIcons();
    </script>
  </body>
</html>
