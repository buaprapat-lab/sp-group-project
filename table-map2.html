<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERIOUS PUNCH: TABLE MAP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans+Thai:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-color: #eeeeee;
        --accent-red: #e4002b;
        --card-black: #242424;
        --text-white: #ffffff;
        --border-dash: #cccccc;
        --pulse-glow: #ffffff;
        --gray-sub: #888888;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        font-family: "IBM Plex Sans Thai", sans-serif;
        color: var(--card-black);
        height: 100vh;
        display: flex;
        overflow: hidden;
      }

      /* --- Sidebar Navigation --- */
      aside {
        width: 90px;
        background: var(--card-black);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 0;
        gap: 35px;
        border-right: 2px solid #333;
      }

      .nav-icon {
        color: var(--gray-sub);
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .nav-icon:hover {
        color: var(--text-white);
        transform: scale(1.1);
      }
      .nav-icon.active {
        color: var(--accent-red);
      }

      /* --- Main Content --- */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 25px;
        overflow-y: auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .logo-area h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        line-height: 0.9;
        letter-spacing: 1px;
      }

      .status-summary {
        display: flex;
        gap: 15px;
      }
      .status-badge {
        background: var(--card-black);
        color: white;
        padding: 12px 24px;
        border-radius: 4px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 4px solid var(--accent-red);
        font-size: 0.9rem;
      }

      /* --- Controls --- */
      .controls {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
        align-items: center;
      }

      .tabs {
        display: flex;
        gap: 8px;
      }
      .tab {
        background: white;
        border: 2px solid var(--card-black);
        padding: 10px 18px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 0.85rem;
        transition: 0.2s;
      }
      .tab.active {
        background: var(--card-black);
        color: white;
      }
      .tab-date.active {
        background: var(--accent-red);
        border-color: var(--accent-red);
        color: white;
      }

      /* --- Floor Plan --- */
      .floor-plan {
        flex: 1;
        background: white;
        position: relative;
        border: 5px solid var(--card-black);
        border-radius: 12px;
        min-height: 500px;
        background-image: radial-gradient(#e0e0e0 1.5px, transparent 1.5px);
        background-size: 30px 30px;
        box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.05);
      }

      .table {
        position: absolute;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        font-weight: bold;
      }
      .table:hover {
        transform: scale(1.08);
        z-index: 10;
      }

      .shape-square {
        width: 95px;
        height: 95px;
        border-radius: 8px;
      }
      .shape-circle {
        width: 95px;
        height: 95px;
        border-radius: 50%;
      }
      .shape-long {
        width: 190px;
        height: 95px;
        border-radius: 12px;
      }

      .FREE {
        border: 3px dashed var(--border-dash);
        background: rgba(255, 255, 255, 0.9);
        color: #bbb;
      }
      .OCCUPIED {
        background: var(--accent-red);
        color: white;
        border: 3px solid var(--accent-red);
        box-shadow: 0 6px 0px #800018;
      }
      .BILL {
        background: var(--accent-red);
        color: white;
        animation: billPulse 1s infinite alternate;
      }

      @keyframes billPulse {
        from {
          box-shadow: 0 0 5px var(--accent-red);
        }
        to {
          box-shadow: 0 0 25px var(--pulse-glow);
          border: 3px solid var(--accent-red);
        }
      }

      .table-id {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        line-height: 1;
      }
      .table-timer {
        font-size: 0.8rem;
        margin-top: 4px;
        font-weight: 300;
        background: rgba(0, 0, 0, 0.2);
        padding: 2px 6px;
        border-radius: 10px;
      }
      .cap-icon {
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 2px;
      }

      /* --- Modal --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(4px);
      }
      .modal {
        background: var(--card-black);
        width: 420px;
        padding: 35px;
        border-radius: 4px;
        color: white;
        border-top: 10px solid var(--accent-red);
      }
      .modal h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        margin-bottom: 5px;
      }

      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 25px;
      }
      .btn {
        padding: 18px;
        border: none;
        border-radius: 4px;
        font-weight: 700;
        cursor: pointer;
        font-family: "IBM Plex Sans Thai";
        text-transform: uppercase;
        transition: 0.2s;
      }
      .btn-red {
        background: var(--accent-red);
        color: white;
      }
      .btn-red:hover {
        background: #ff1a43;
      }
      .btn-dark {
        background: #3a3a3a;
        color: white;
      }
      .btn-outline {
        background: transparent;
        border: 1.5px solid #555;
        color: #888;
      }
      .full-width {
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <aside>
      <div class="nav-icon active"><i data-lucide="layout-grid"></i></div>
      <div class="nav-icon"><i data-lucide="clipboard-list"></i></div>
      <div class="nav-icon"><i data-lucide="banknote"></i></div>
      <div class="nav-icon"><i data-lucide="history"></i></div>
      <div class="nav-icon"><i data-lucide="settings"></i></div>
    </aside>

    <main>
      <header>
        <div class="logo-area">
          <h1>
            SERIOUS PUNCH:<br /><span style="color: var(--accent-red)"
              >TABLE MAP</span
            >
          </h1>
        </div>
        <div class="status-summary">
          <div class="status-badge">FREE: <span id="count-free">0</span></div>
          <div class="status-badge" style="border-color: #555">
            OCCUPIED: <span id="count-occ">0</span>
          </div>
        </div>
      </header>

      <div class="controls">
        <div class="tabs">
          <div class="tab active">Available</div>
          <div class="tab">Occupied</div>
          <div class="tab">Check</div>
          <div class="tab">Reserved</div>
        </div>
        <div class="tabs">
          <button class="tab">
            <i data-lucide="chevron-left" style="width: 16px"></i>
          </button>
          <div class="tab tab-date active">9 APR</div>
          <button class="tab">
            <i data-lucide="chevron-right" style="width: 16px"></i>
          </button>
        </div>
      </div>

      <div class="floor-plan" id="floor-plan"></div>
    </main>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h2 id="modal-table-id">TABLE T-01</h2>
        <p id="modal-meta" style="color: var(--gray-sub)">
          Capacity: 4 Seats | Status: Occupied
        </p>
        <div class="action-grid" id="modal-actions"></div>
        <button
          class="btn btn-outline full-width"
          style="margin-top: 15px"
          onclick="closeModal()"
        >
          CLOSE
        </button>
      </div>
    </div>

    <script>
      let tables = [
        {
          id: "T-01",
          shape: "square",
          cap: 4,
          status: "FREE",
          startTime: null,
          x: 8,
          y: 12,
        },
        {
          id: "T-02",
          shape: "square",
          cap: 4,
          status: "OCCUPIED",
          startTime: Date.now() - 1200000,
          x: 8,
          y: 38,
        },
        {
          id: "T-03",
          shape: "square",
          cap: 4,
          status: "FREE",
          startTime: null,
          x: 8,
          y: 64,
        },
        {
          id: "T-04",
          shape: "square",
          cap: 2,
          status: "FREE",
          startTime: null,
          x: 28,
          y: 38,
        },
        {
          id: "VIP-1",
          shape: "long",
          cap: 8,
          status: "BILL",
          startTime: Date.now() - 3600000,
          x: 42,
          y: 12,
        },
        {
          id: "T-05",
          shape: "long",
          cap: 6,
          status: "FREE",
          startTime: null,
          x: 42,
          y: 64,
        },
        {
          id: "B-01",
          shape: "circle",
          cap: 2,
          status: "OCCUPIED",
          startTime: Date.now() - 500000,
          x: 72,
          y: 18,
        },
        {
          id: "B-02",
          shape: "circle",
          cap: 2,
          status: "FREE",
          startTime: null,
          x: 84,
          y: 35,
        },
        {
          id: "B-03",
          shape: "circle",
          cap: 2,
          status: "FREE",
          startTime: null,
          x: 72,
          y: 52,
        },
        {
          id: "B-04",
          shape: "circle",
          cap: 2,
          status: "OCCUPIED",
          startTime: Date.now() - 100000,
          x: 84,
          y: 69,
        },
      ];

      function renderTables() {
        const floorPlan = document.getElementById("floor-plan");
        floorPlan.innerHTML = "";
        let freeCount = 0,
          occCount = 0;

        tables.forEach((table) => {
          table.status === "FREE" ? freeCount++ : occCount++;
          const div = document.createElement("div");
          div.className = `table shape-${table.shape} ${table.status}`;
          div.style.left = `${table.x}%`;
          div.style.top = `${table.y}%`;
          div.innerHTML = `
            <div class="cap-icon"><i data-lucide="users" style="width:12px;height:12px"></i> ${table.cap}</div>
            <div class="table-id">${table.id}</div>
            ${table.startTime ? `<div class="table-timer" id="timer-${table.id}">${formatTime(table.startTime)}</div>` : ""}
          `;
          div.onclick = () => openModal(table.id);
          floorPlan.appendChild(div);
        });

        document.getElementById("count-free").innerText = freeCount;
        document.getElementById("count-occ").innerText = occCount;
        lucide.createIcons(); // ต้องเรียกใหม่ทุกครั้งหลังเปลี่ยน DOM
      }

      function formatTime(startTime) {
        const diff = Date.now() - startTime;
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        return `${mins}:${secs < 10 ? "0" + secs : secs}m`;
      }

      setInterval(() => {
        tables.forEach((table) => {
          if (table.startTime) {
            const timerEl = document.getElementById(`timer-${table.id}`);
            if (timerEl) timerEl.innerText = formatTime(table.startTime);
          }
        });
      }, 1000);

      function openModal(id) {
        const table = tables.find((t) => t.id === id);
        document.getElementById("modal-table-id").innerText =
          `TABLE ${table.id}`;
        document.getElementById("modal-actions").innerHTML =
          table.status === "FREE"
            ? `<button class="btn btn-red full-width" onclick="updateStatus('${id}','OCCUPIED')">OPEN TABLE / WALK-IN</button>`
            : `<button class="btn btn-red" onclick="alert('Going to Order Screen...')">ADD ORDER</button>
             <button class="btn btn-dark" onclick="updateStatus('${id}','BILL')">PRINT BILL</button>
             <button class="btn btn-dark" style="background:#28a745" onclick="updateStatus('${id}','FREE')">CONFIRM PAYMENT</button>
             <button class="btn btn-outline" onclick="updateStatus('${id}','FREE')">VOID TABLE</button>`;
        document.getElementById("modal-overlay").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("modal-overlay").style.display = "none";
      }

      function updateStatus(id, newStatus) {
        const table = tables.find((t) => t.id === id);
        table.status = newStatus;
        table.startTime =
          newStatus === "OCCUPIED"
            ? Date.now()
            : newStatus === "FREE"
              ? null
              : table.startTime;
        renderTables();
        closeModal();
      }

      renderTables();
    </script>
  </body>
</html>
